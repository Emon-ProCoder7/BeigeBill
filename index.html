<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEIGE AI | Sales Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --gold: #C5A059;
            --gold-light: #E2C287;
            --bg: #050505;
            --card-bg: rgba(15, 15, 15, 0.8);
            --border: rgba(197, 160, 89, 0.2);
            --text-main: #FFFFFF;
            --text-dim: #888888;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 2% 2%, rgba(197, 160, 89, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 98% 98%, rgba(197, 160, 89, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(5,5,5,0) 0%, rgba(197, 160, 89, 0.02) 100%);
            pointer-events: none;
        }

        #main-portal {
            width: 100%;
            max-width: 750px;
            padding: 50px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 30px;
            position: relative;
            z-index: 10;
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
        }

        .header-section {
            text-align: left;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.4em;
            margin: 0;
            color: var(--gold);
            text-transform: uppercase;
        }

        .tagline {
            font-size: 2.2rem;
            color: #fff;
            font-weight: 300;
            margin-top: 10px;
            display: block;
            letter-spacing: -0.02em;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        /* Client Info Fields Styling */
        .client-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr; /* Updated to 3 columns */
            gap: 12px;
            margin-bottom: 15px;
        }

        input[type="text"], input[type="email"], input[type="tel"] {
            width: 100%;
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #fff;
            padding: 15px 18px;
            font-size: 0.85rem;
            outline: none;
            transition: all 0.3s ease;
        }

        textarea {
            width: 100%;
            height: 220px;
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            color: #fff;
            padding: 25px;
            font-size: 1rem;
            line-height: 1.6;
            font-family: 'Inter', sans-serif;
            resize: none;
            outline: none;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        textarea:focus, input:focus {
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button, .btn-link {
            padding: 20px 30px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            text-decoration: none;
        }

        .btn-preview {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .btn-preview:hover {
            border-color: #fff;
            background: rgba(255,255,255,0.05);
        }

        .btn-direct {
            background: var(--gold);
            border: none;
            color: #000;
        }

        .btn-direct:hover {
            background: var(--gold-light);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(197, 160, 89, 0.2);
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        #status-msg {
            margin-top: 25px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            min-height: 20px;
            color: var(--text-dim);
            text-align: center;
        }

        #invoice-result {
            display: none;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .loading-dots:after {
            content: ' .';
            animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {
            0%, 20% { color: rgba(0,0,0,0); text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); }
            40% { color: var(--gold); text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); }
            60% { text-shadow: .25em 0 0 var(--gold), .5em 0 0 rgba(0,0,0,0); }
            80%, 100% { text-shadow: .25em 0 0 var(--gold), .5em 0 0 var(--gold); }
        }

        /* Responsive stack for mobile */
        @media (max-width: 600px) {
            .client-grid { grid-template-columns: 1fr; }
            #main-portal { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div id="main-portal">
        <div class="header-section">
            <h1>Beige Intelligence</h1>
            <span class="tagline">Sales Dispatch Portal</span>
        </div>

        <div class="client-grid">
            <input type="text" id="clientName" placeholder="Client Name">
            <input type="email" id="clientEmail" placeholder="Client Email">
            <input type="tel" id="clientPhone" placeholder="Phone Number">
        </div>

        <div class="input-wrapper">
            <textarea id="rawNotes" placeholder="Enter transcript, raw meeting notes, or lead data..."></textarea>
        </div>

        <div class="btn-group">
            <button onclick="handleSubmit('preview')" id="btn-preview" class="btn-preview">
                Review Draft
            </button>
            <button onclick="handleSubmit('direct')" id="btn-direct" class="btn-direct">
                Finalize & Execute
            </button>
        </div>

        <div id="status-msg">System Ready</div>

        <div id="invoice-result">
            <a id="invoice-link" href="#" target="_blank" class="btn-direct" style="display: block; width: 100%;">
                View Generated Invoice
            </a>
        </div>
    </div>

    <script>
        window.onload = () => {
            gsap.from("#main-portal", { 
                opacity: 0, 
                scale: 0.98,
                y: 30, 
                duration: 1.2, 
                ease: "expo.out" 
            });
            gsap.from(".header-section > *, .client-grid, .input-wrapper", {
                opacity: 0,
                y: 15,
                stagger: 0.1,
                duration: 1,
                ease: "power2.out",
                delay: 0.5
            });
        };

        async function handleSubmit(mode) {
            const notes = document.getElementById('rawNotes').value;
            const name = document.getElementById('clientName').value;
            const email = document.getElementById('clientEmail').value;
            const phone = document.getElementById('clientPhone').value;
            const status = document.getElementById('status-msg');
            const btnP = document.getElementById('btn-preview');
            const btnD = document.getElementById('btn-direct');
            const resultBox = document.getElementById('invoice-result');
            const invoiceLink = document.getElementById('invoice-link');

            if (!notes.trim() || !name.trim()) {
                status.innerHTML = '<span style="color: #ff4444;">Required: Name and Input Data.</span>';
                gsap.fromTo("#main-portal", { x: -2 }, { x: 2, duration: 0.05, repeat: 4, yoyo: true });
                return;
            }

            btnP.disabled = true;
            btnD.disabled = true;
            resultBox.style.display = "none";
            status.innerHTML = `Synthesizing Intelligence<span class="loading-dots"></span>`;
            status.style.color = "var(--gold)";

            const data = {
                Name: name.trim(),
                Email: email.trim(),
                Phone: phone.trim(),
                raw_data: notes.trim(),
                timestamp: new Date().toISOString(),
                execution_mode: mode
            };

            try {
                const response = await fetch('https://beigevideo.app.n8n.cloud/webhook/invoice', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data),
                });

                if (response.ok) {
                    const result = await response.json();
                    
                    const invoiceId = result._id || result.id;
                    if (invoiceId) {
                        invoiceLink.href = `https://api.checkouts.com/v2/invoice/view/${invoiceId}?location_id=qEVS4SLNDJ3rEFj42h3u`;
                        resultBox.style.display = "block";
                        gsap.from(resultBox, { opacity: 0, y: 10, duration: 0.5 });
                    }

                    status.innerHTML = `<span style="color: #C5A059;">Transmission Successful. Protocol Initiated.</span>`;
                    document.getElementById('rawNotes').value = "";
                    gsap.to("#main-portal", { boxShadow: "0 0 50px rgba(197, 160, 89, 0.2)", duration: 0.5, yoyo: true, repeat: 1 });
                } else {
                    throw new Error('Server error');
                }
            } catch (err) {
                console.error(err);
                status.innerHTML = '<span style="color: #ff4444;">Uplink Failed. Verify Webhook Status.</span>';
            } finally {
                setTimeout(() => {
                    btnP.disabled = false;
                    btnD.disabled = false;
                    status.innerText = "Go and Check GHL Invoice tab";
                }, 4000);
            }
        }
    </script>
</body>
</html>
